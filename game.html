<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCore — Web Tycoon</title>
<meta name="description" content="Play the GCore Web Tycoon online — build generators, prestige, and see other players in real time.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--purple:#a463d6;--pl:#cd8cff;--gold:#ffd700;--text:#f0f0f5;--t3:#5a5a6a}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text)}
#gameFrame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;background:var(--bg)}

/* floating back-to-site pill (clear of the game's own corner UI) */
#back{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:8px;align-items:center;
      background:rgba(10,10,15,.72);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:5px 6px 5px 14px;backdrop-filter:blur(8px);font-size:.78rem}
#back a{color:var(--t3);text-decoration:none;font-weight:600;transition:color .15s}
#back a:hover{color:var(--pl)}
#back .sep{color:#2a2a34}
#back .ext{background:var(--purple);color:#fff;padding:5px 12px;border-radius:100px}
#back .ext:hover{background:#7b3fad;color:#fff}

/* loading splash for the Render cold-start */
#splash{position:fixed;inset:0;z-index:30;background:radial-gradient(circle at 50% 35%,#1a1030,#0a0a0f);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .6s}
#splash.hide{opacity:0;pointer-events:none}
#splash .logo{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:2.6rem;letter-spacing:1px;
              background:linear-gradient(135deg,var(--pl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#splash .spinner{width:44px;height:44px;border:4px solid rgba(205,140,255,.2);border-top-color:var(--pl);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#splash .msg{font-size:1rem;font-weight:600;color:var(--text)}
#splash .tip{font-size:.82rem;color:var(--t3);max-width:340px;text-align:center;line-height:1.5}
#splash .tip b{color:#9a8ab0}
</style>
</head>
<body>

<iframe id="gameFrame" src="https://gcore-tycoon.onrender.com/" title="GCore Web Tycoon"
        allow="autoplay; fullscreen" onload="frameLoaded()"></iframe>

<div id="back">
    <a href="index.html">← GCore</a>
    <span class="sep">|</span>
    <a class="ext" href="https://gcore-tycoon.onrender.com/" target="_blank" rel="noopener">Full screen ↗</a>
</div>

<div id="splash">
    <div class="logo">GCORE TYCOON</div>
    <div class="spinner"></div>
    <div class="msg" id="splashMsg">Connecting to the GCore world…</div>
    <div class="tip" id="splashTip">First load can take up to <b>~30 seconds</b> while the free game server wakes up. After that it's instant.</div>
</div>

<script>
let loaded = false;
function frameLoaded(){
    loaded = true;
    const s = document.getElementById('splash');
    // small delay so the game's own login screen is painted before the splash lifts
    setTimeout(() => s.classList.add('hide'), 400);
}
// Friendlier message if the cold-start is taking a while
setTimeout(() => { if(!loaded) document.getElementById('splashMsg').textContent = 'Waking up the game server…'; }, 6000);
setTimeout(() => { if(!loaded){
    document.getElementById('splashMsg').textContent = 'Almost there…';
    document.getElementById('splashTip').innerHTML = 'Free servers sleep when idle. Hang tight — this only happens on the first visit.';
}}, 15000);
// Safety: never leave the splash up forever
setTimeout(() => document.getElementById('splash').classList.add('hide'), 35000);
</script>
</body>
</html>
